version: 2

sources:
  - name: staging
    database: AIRBNB
    schema: STAGING
    tables:
      - name: listings
        columns:
          - name: listing_id
            tests:
              - unique
              - not_null
      - name: bookings
        columns:
          - name: booking_id
            tests:
              - unique
              - not_null
      - name: hosts
        columns:
          - name: host_id
            tests:
              - unique
              - not_null
